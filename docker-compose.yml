services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && yarn install --immutable && yarn start"
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "8080:8080"
    environment:
      - SIHSALUS_BACKEND_URL=${SIHSALUS_BACKEND_URL:-http://hii1sc-dev.inf.pucp.edu.pe}
      - SIHSALUS_AUTH_MODE=openmrs
      - SIHSALUS_DEV_APPS=esm-login-app,esm-home-app
