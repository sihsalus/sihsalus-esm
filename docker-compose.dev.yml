services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && yarn dev"
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "8080:8080"
    environment:
      - SIHSALUS_BACKEND_URL=http://backend:8080
      - SIHSALUS_AUTH_MODE=openmrs
    depends_on:
      - backend

  backend:
    image: openmrs/openmrs-reference-application:latest
    ports:
      - "8081:8080"
